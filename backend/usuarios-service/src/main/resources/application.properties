# =============================================
# DATASOURCE - Supabase
# =============================================
spring.datasource.url=jdbc:postgresql://${DB_HOST:aws-0-us-west-1.pooler.supabase.com}:${DB_PORT:5432}/${DB_NAME:postgres}
spring.datasource.username=${DB_USER:postgres.aahizrqglqnopemispxk}
spring.datasource.password=${DB_PASSWORD:smartlogix123}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool (importante para Supabase)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000

# =============================================
# JPA / HIBERNATE
# =============================================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.default_schema=usuarios
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.defer-datasource-initialization=false

# =============================================
# FLYWAY - Migraciones
# =============================================
spring.flyway.enabled=true
spring.flyway.schemas=usuarios
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

# =============================================
# JWT
# =============================================
app.jwt.secret=${JWT_SECRET:lWnU4PG7BEA/5SKh/+YhYh1WKoHVRAfMatbdA9mUTww=}
app.jwt.expiration=86400000

# =============================================
# SERVIDOR
