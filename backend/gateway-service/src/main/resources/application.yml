spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
      routes:
        - id: inventario-service
          uri: http://localhost:8001
          predicates:
            - Path=/api/inventario/**

        - id: pedidos-service
          uri: http://localhost:8002
          predicates:
            - Path=/api/pedidos/**

        - id: envios-service
          uri: http://localhost:8003
          predicates:
            - Path=/api/envios/**

        - id: usuarios-service
          uri: http://localhost:8004
          predicates:
            - Path=/api/usuarios/**

server:
  port: 8080